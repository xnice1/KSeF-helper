app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  auth:
    refresh-cookie-secure: true
    email-verification-required: true
  mail:
    delivery: smtp
  storage:
    type: s3
    s3:
      bucket: ${S3_BUCKET}

server:
  forward-headers-strategy: framework

spring:
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
